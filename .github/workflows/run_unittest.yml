name: CI/CD Backend
env:
  REPO_NAME: ${{ github.event.repository.name }}
on:
  pull_request:
    paths:
      - 'backend/**'
      - '!backend/README.md'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run tests
        working-directory: backend
        run: uv run pytest
