services:
  postgres:
    image: postgres:16-alpine
    container_name: tramites-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tramites
      POSTGRES_PASSWORD: tramites
      POSTGRES_DB: tramites_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramites -d tramites_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
